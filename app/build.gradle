plugins {
    // Apply the application plugin to add support for building a CLI application in Java.
    id 'application'

    // plugin do javaFX 
    id 'org.openjfx.javafxplugin' version '0.1.0'
}

repositories {
    // Use Maven Central for resolving dependencies.
    mavenCentral()
}

dependencies {
    // Use JUnit Jupiter for testing.
    testImplementation libs.junit.jupiter

    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'

    // This dependency is used by the application.
    implementation libs.guava

    // pacote com as novas fontes
    implementation 'org.kordamp.ikonli:ikonli-javafx:12.4.0'    
    
    // pacote com novos icones
    implementation 'org.kordamp.ikonli:ikonli-fontawesome5-pack:12.4.0' 

    // vamos ver como fica com esses icones
    implementation 'org.kordamp.ikonli:ikonli-material-pack:12.4.0'

    // dependencia do gson para ler os dados
    implementation 'com.google.code.gson:gson:2.10.1'

}

// Apply a specific Java toolchain to ease working on different environments.
java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

javafx {
    version = "21" 
    modules = [ 'javafx.controls', 'javafx.fxml' ]
}

application {
    // Define the main class for the application.
    mainClass = 'projetofinal.LoginApplication'
}

tasks.named('test') {
    // Use JUnit Platform for unit tests.
    useJUnitPlatform()
}
